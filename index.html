<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">
	<title>hanselz@portfolio</title>
	<meta name="description" content="Cybersecurity (USF), Japanese Language Study Club President." />
	<link rel="icon" href="favicon.svg" type="image/svg+xml" />
	<link rel="stylesheet" href="style.css" />
</head>

<body>
	<div class="terminal-window">
		<div class="terminal-titlebar">
			<div class="traffic-lights">
				<span class="light red"></span>
				<span class="light yellow"></span>
				<span class="light green"></span>
			</div>
			<span class="terminal-title" id="terminal-title">visitor@hanselz.dev: ~</span>
			<div class="titlebar-spacer"></div>
		</div>
		<div class="terminal-body" id="terminal">
			<div id="output"></div>
			<div class="input-line" id="input-line">
				<script>
					const now = new Date();
					document.getElementById("input-line").innerHTML = `<span class="prompt">[&nbsp;${now.getHours()}:${now.getMinutes()}&nbsp;]</span>`;
				</script>
				<span style="color: #ffaf00;">&nbsp;visitor&nbsp;</span>
				<span class="prompt"><&nbsp;<span style="color: #808080">~</span>&nbsp;>&nbsp;==>&nbsp;</span>
				<input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false"
					aria-label="Terminal command input">
			</div>
		</div>
	</div>

	<script src="js/terminal.js" defer></script>
</body>

</html>
